name: Build Android APK

on:
  push:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo and EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN || secrets.EAS_TOKEN }}

      - name: Validate Expo/EAS token
        run: |
          if [ -z "$EXPO_TOKEN" ] && [ -z "$EAS_TOKEN" ]; then
            echo "ERROR: Missing Expo/EAS token. Set repository secret EXPO_TOKEN or EAS_TOKEN."
            exit 1
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}

      - name: Build Android APK via EAS (waits for completion)
        id: eas_build
        working-directory: artifacts/mobile
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --wait \
            --json 2>/dev/null)
          echo "$BUILD_JSON" > eas-build-result.json
          echo "--- EAS build output (first 500 chars) ---"
          echo "$BUILD_JSON" | head -c 500
          echo ""
          echo "------------------------------------------"
          APK_URL=$(echo "$BUILD_JSON" | python3 - <<'PYEOF'
import sys, json
raw = sys.stdin.read().strip()
try:
    d = json.loads(raw)
except Exception as e:
    print("", end="")
    sys.exit(0)
# eas build --json returns either a list or a single object
if isinstance(d, list):
    d = d[0] if d else {}
# Try every known field name EAS has used across versions
artifacts = d.get("artifacts") or {}
url = (
    artifacts.get("buildUrl")
    or artifacts.get("url")
    or artifacts.get("archiveUrl")
    or d.get("buildUrl")
    or d.get("url")
    or ""
)
print(url, end="")
PYEOF
)
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
          if [ -z "$APK_URL" ]; then
            echo "WARNING: Could not parse APK URL from EAS output. Full JSON saved to eas-build-result.json artifact."
          else
            echo "APK URL: $APK_URL"
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN || secrets.EAS_TOKEN }}
          EAS_TOKEN: ${{ secrets.EAS_TOKEN || secrets.EXPO_TOKEN }}

      - name: Upload EAS build result (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-result-${{ github.sha }}
          path: artifacts/mobile/eas-build-result.json
          retention-days: 7

      - name: Download APK
        working-directory: artifacts/mobile
        run: |
          APK_URL="${{ steps.eas_build.outputs.apk_url }}"
          if [ -z "$APK_URL" ]; then
            echo "ERROR: APK download URL is missing." >&2
            echo "Check the 'eas-build-result' artifact uploaded above for the raw EAS JSON output." >&2
            exit 1
          fi
          curl -L "$APK_URL" -o career-compass.apk
          echo "Downloaded APK: $(du -sh career-compass.apk)"

      - name: Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: career-compass-android-${{ github.sha }}
          path: artifacts/mobile/career-compass.apk
          retention-days: 30

      - name: Build summary
        run: |
          echo "## Android APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Download:** Go to the _Artifacts_ section of this workflow run and download \`career-compass-android-${{ github.sha }}\`." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install on Android:** Enable _Install from unknown sources_ in your phone settings, then open the downloaded APK." >> $GITHUB_STEP_SUMMARY
